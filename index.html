<meta name="theme-color" content="#c1121f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  :root{
    --ink:#241c14; --ink-soft:#4a3d2e; --paper:#e9ddc3;
    --board:#e3c98f; --board-line:#5a3d1c;
    --han:#c1121f; --han-deep:#7e0d15;
    --cho:#15633b; --cho-deep:#0c3d24;
    --gold:#b58a3c; --shadow:rgba(60,40,15,.35);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    font-family:"Noto Serif KR","Nanum Myeongjo",serif;
    background:
      radial-gradient(circle at 30% 12%, #f0e6cd 0%, transparent 55%),
      radial-gradient(circle at 78% 88%, #e2d0ad 0%, transparent 50%),
      #dccdaa;
    color:var(--ink);
    display:flex; flex-direction:column; align-items:center;
    min-height:100%; overflow-x:hidden; user-select:none;
  }
  header{width:100%; max-width:520px; text-align:center; padding:14px 12px 4px;}
  .brand{display:flex; align-items:center; justify-content:center; gap:12px;}
  .seal{
    width:44px; height:44px; border-radius:8px; background:var(--han);
    color:#f4e7cf; font-size:26px; font-weight:700; display:flex;
    align-items:center; justify-content:center; box-shadow:0 3px 0 var(--han-deep);
    font-family:"Noto Serif KR",serif;
  }
  .brand h1{font-size:23px; margin:0; letter-spacing:6px; color:var(--ink);}
  .brand h1 small{display:block; font-size:12px; letter-spacing:3px; color:var(--ink-soft); margin-top:2px;}

  #statusbar{width:100%; max-width:520px; padding:6px 16px 10px;
    display:flex; align-items:center; justify-content:space-between; gap:8px;}
  #turnbadge{display:flex; align-items:center; gap:8px; font-size:15px; font-weight:600;
    background:var(--paper); border:1px solid #c9b485; border-radius:20px;
    padding:6px 14px; box-shadow:0 2px 5px var(--shadow);}
  .dot{width:14px; height:14px; border-radius:50%; box-shadow:inset 0 -2px 3px rgba(0,0,0,.3);}
  .dot.han{background:var(--han);} .dot.cho{background:var(--cho);}
  #msg{font-size:14px; color:var(--han-deep); font-weight:600; min-height:20px; text-align:right; flex:1;}

  #boardwrap{position:relative; width:100%; max-width:520px; padding:0 10px 4px; touch-action:none;}
  #checkBadge{position:absolute; top:10px; left:50%; transform:translateX(-50%);
    display:none; align-items:center; gap:9px; z-index:10; pointer-events:none;
    background:linear-gradient(180deg,#d51f2b,#a50f1a); color:#fff5f0;
    padding:9px 22px; border-radius:15px; font-size:22px; font-weight:800; letter-spacing:5px;
    box-shadow:0 5px 18px rgba(120,10,20,.55), inset 0 1px 0 rgba(255,255,255,.35);
    text-shadow:0 1px 2px rgba(80,0,5,.6);
    animation:checkPulse .8s ease-in-out infinite;}
  #checkBadge span{font-size:14px; letter-spacing:2px; font-weight:700;}
  @keyframes checkPulse{
    0%,100%{transform:translateX(-50%) scale(1); box-shadow:0 5px 18px rgba(120,10,20,.5), inset 0 1px 0 rgba(255,255,255,.35);}
    50%{transform:translateX(-50%) scale(1.09); box-shadow:0 7px 24px rgba(200,20,30,.75), inset 0 1px 0 rgba(255,255,255,.35);}
  }
  canvas{width:100%; height:auto; display:block; border-radius:8px;
    box-shadow:0 10px 28px var(--shadow), 0 2px 0 #c3aa78; background:var(--board);}

  #controls{width:100%; max-width:520px; padding:12px 14px 6px;
    display:grid; grid-template-columns:repeat(5,1fr); gap:7px;}
  .btn{font-family:inherit; font-size:13px; font-weight:600; color:var(--ink);
    background:var(--paper); border:1px solid #c4ad7d; border-radius:11px;

</style>

<body>

<script>
/* =========================================================
   한국 장기 (Janggi)
   좌표 board[r][c], r0=상단(초/楚), r9=하단(한/漢), c0..8
   ========================================================= */
const CHO='c', HAN='h';
const opp=s=>s===CHO?HAN:CHO;
// 기물: K왕(궁) A사 E상 H마 R차 C포 P졸/병
const GLYPH={
  h:{K:'漢',A:'士',E:'象',H:'馬',R:'車',C:'包',P:'兵'},
  c:{K:'楚',A:'士',E:'象',H:'馬',R:'車',C:'包',P:'卒'}
};
// 장기 기물 점수 ×100 (차13 포7 마5 상3 사3 병2)
const VALUE={K:60000,R:1300,C:700,H:500,E:300,A:300,P:200};
// 입체 팔각말 반지름 배율(CELL 대비) — 크기 차등을 크게
const SIZE={K:0.520, R:0.455, C:0.450, H:0.420, E:0.418, A:0.375, P:0.330};

const inB=(r,c)=>r>=0&&r<10&&c>=0&&c<9;
const inPal=(r,c)=> c>=3&&c<=5 && ((r>=0&&r<=2)||(r>=7&&r<=9));
const DIAG=new Set(['0,3','0,5','2,3','2,5','1,4','7,3','7,5','9,3','9,5','8,4']);
const isDiagPt=(r,c)=>DIAG.has(r+','+c);
function palaceDiagNeighbors(r,c){
  if(!isDiagPt(r,c))return[];
  const centers=[[1,4],[8,4]], res=[];
  for(const[cr,cc]of centers){
    if(r===cr&&c===cc){ for(const[dr,dc]of[[1,1],[1,-1],[-1,1],[-1,-1]]) if(inPal(r+dr,c+dc))res.push([r+dr,c+dc]); }
    else if(Math.abs(r-cr)===1&&Math.abs(c-cc)===1) res.push([cr,cc]);
  }
  return res;
}

let board, turn, mode, aiDepth, humanColor, setupType='HE';
let selected=null, legalForSel=[], history=[], gameOver=false;
let soundOn=true, lastMove=null, hintTarget=null, thinking=false, flip=false;
let posLog=[];              // 각 국면(반상+차례) 서명 기록 — 반복 장군 판정용
const REP_LIMIT=3;          // 같은 장군 국면 3회째 = 반칙패

/* ---------- 이동 생성 ---------- */
function pieceMoves(b,r,c){
  const p=b[r][c]; if(!p)return[];
  const s=p.c, out=[];
  const push=(rr,cc)=>{ if(inB(rr,cc)&&(!b[rr][cc]||b[rr][cc].c!==s))out.push([rr,cc]); };
  switch(p.t){
    case 'K': case 'A':{
      for(const[dr,dc]of[[1,0],[-1,0],[0,1],[0,-1]]){ const rr=r+dr,cc=c+dc; if(inPal(rr,cc))push(rr,cc); }
      for(const[rr,cc]of palaceDiagNeighbors(r,c)) push(rr,cc);
      break; }
    case 'R':{
      for(const[dr,dc]of[[1,0],[-1,0],[0,1],[0,-1]]){
        let rr=r+dr,cc=c+dc;
        while(inB(rr,cc)){ if(!b[rr][cc]){out.push([rr,cc]);rr+=dr;cc+=dc;} else{ if(b[rr][cc].c!==s)out.push([rr,cc]); break; } } }
      if(isDiagPt(r,c)){
        const chains=[[[0,3],[1,4],[2,5]],[[2,3],[1,4],[0,5]],[[7,3],[8,4],[9,5]],[[9,3],[8,4],[7,5]]];
        for(const ch of chains){ const idx=ch.findIndex(pt=>pt[0]===r&&pt[1]===c); if(idx<0)continue;
          for(const dir of[1,-1]){ let i=idx+dir;
            while(i>=0&&i<ch.length){ const[rr,cc]=ch[i];
              if(!b[rr][cc]){out.push([rr,cc]);i+=dir;} else{ if(b[rr][cc].c!==s)out.push([rr,cc]); break; } } } } }
      break; }
    case 'C':{
      for(const[dr,dc]of[[1,0],[-1,0],[0,1],[0,-1]]){
        let rr=r+dr,cc=c+dc,screen=false;
        while(inB(rr,cc)){
          if(!screen){ if(b[rr][cc]){ if(b[rr][cc].t==='C')break; screen=true; } }
          else { if(!b[rr][cc])out.push([rr,cc]); else{ if(b[rr][cc].t!=='C'&&b[rr][cc].c!==s)out.push([rr,cc]); break; } }
          rr+=dr;cc+=dc;
        } }
      if(isDiagPt(r,c)){
        const chains=[[[0,3],[1,4],[2,5]],[[2,3],[1,4],[0,5]],[[7,3],[8,4],[9,5]],[[9,3],[8,4],[7,5]]];
        for(const ch of chains){ const idx=ch.findIndex(pt=>pt[0]===r&&pt[1]===c); if(idx!==0&&idx!==2)continue;
          const mid=ch[1], end=ch[idx===0?2:0], m=b[mid[0]][mid[1]];
          if(m&&m.t!=='C'){ const t=b[end[0]][end[1]];
            if(!t)out.push(end); else if(t.t!=='C'&&t.c!==s)out.push(end); } } }
      break; }
    case 'H':{
      const legs=[[-2,-1,-1,0],[-2,1,-1,0],[2,-1,1,0],[2,1,1,0],[-1,-2,0,-1],[1,-2,0,-1],[-1,2,0,1],[1,2,0,1]];
      for(const[dr,dc,br,bc]of legs){ if(!inB(r+br,c+bc)||b[r+br][c+bc])continue; push(r+dr,c+dc); }
      break; }
    case 'E':{
      const legs=[[-3,-2,-1,0,-2,-1],[-3,2,-1,0,-2,1],[3,-2,1,0,2,-1],[3,2,1,0,2,1],
                  [-2,-3,0,-1,-1,-2],[2,-3,0,-1,1,-2],[-2,3,0,1,-1,2],[2,3,0,1,1,2]];
      for(const[dr,dc,b1r,b1c,b2r,b2c]of legs){ const rr=r+dr,cc=c+dc; if(!inB(rr,cc))continue;
        if(b[r+b1r][c+b1c])continue; if(b[r+b2r][c+b2c])continue; push(rr,cc); }
      break; }
    case 'P':{
      const fwd = s===HAN? -1 : 1;
      push(r+fwd,c); push(r,c-1); push(r,c+1);
      if(isDiagPt(r,c)){ for(const[rr,cc]of palaceDiagNeighbors(r,c)){
        if((s===HAN&&rr<r)||(s===CHO&&rr>r)) push(rr,cc); } }
      break; }
  }
  return out;
}

function clone(b){return b.map(row=>row.map(x=>x?{c:x.c,t:x.t}:null));}
function findK(b,s){for(let r=0;r<10;r++)for(let c=0;c<9;c++){const p=b[r][c];if(p&&p.c===s&&p.t==='K')return[r,c];}return null;}
function attacked(b,r,c,by){
  for(let i=0;i<10;i++)for(let j=0;j<9;j++){const p=b[i][j];if(p&&p.c===by){
    for(const[rr,cc]of pieceMoves(b,i,j))if(rr===r&&cc===c)return true;}} return false; }
function inCheck(b,s){const k=findK(b,s); if(!k)return true; return attacked(b,k[0],k[1],opp(s)); }
function legalMoves(b,r,c){const p=b[r][c]; if(!p)return[]; const res=[];
  for(const[rr,cc]of pieceMoves(b,r,c)){ const nb=clone(b); nb[rr][cc]=nb[r][c]; nb[r][c]=null;
    if(!inCheck(nb,p.c))res.push([rr,cc]); } return res; }
function allMoves(b,s){const mv=[]; for(let r=0;r<10;r++)for(let c=0;c<9;c++){const p=b[r][c];
  if(p&&p.c===s)for(const[rr,cc]of legalMoves(b,r,c))mv.push([r,c,rr,cc]);} return mv; }

/* ---------- 반복 장군(빅수) 판정 ----------
   국면 서명 = 반상 배치 + 다음 둘 차례.
   장군을 부르는 수가 '같은 장군 국면'을 몇 번째로 만드는지 센다.
   3회째가 되면 장군을 부른 쪽의 반칙패. */
function sig(b,t){ let s=t; for(let r=0;r<10;r++)for(let c=0;c<9;c++){ const p=b[r][c]; s += p?(p.c+p.t):'..'; } return s; }
// 후보 수(mover가 둠)를 실제로 두면 이 장군 국면이 몇 번째로 나타나는가.
// 장군이 아니면 0 반환(반복 규칙 대상 아님).
function checkRepetitionOrdinal(fr,fc,tr,tc,mover){
  const nb=clone(board); nb[tr][tc]=nb[fr][fc]; nb[fr][fc]=null;
  if(!inCheck(nb,opp(mover))) return 0;           // 장군이 아니면 규칙 무관
  const s=sig(nb,opp(mover));
  let prior=0; for(const x of posLog) if(x===s) prior++;
  return prior+1;                                  // 이 수를 두면 나타나는 회차
}

/* ---------- 초기 배치 ---------- */
function makeBoard(){
  const b=Array.from({length:10},()=>Array(9).fill(null));
  const l = setupType==='HE'? ['H','E'] : ['E','H'];
  const rr= setupType==='HE'? ['E','H'] : ['H','E'];
  function back(r,s){ b[r][0]={c:s,t:'R'}; b[r][1]={c:s,t:l[0]}; b[r][2]={c:s,t:l[1]};
    b[r][3]={c:s,t:'A'}; b[r][5]={c:s,t:'A'}; b[r][6]={c:s,t:rr[0]}; b[r][7]={c:s,t:rr[1]}; b[r][8]={c:s,t:'R'}; }
  back(0,CHO); back(9,HAN);
  b[1][4]={c:CHO,t:'K'}; b[8][4]={c:HAN,t:'K'};
  b[2][1]={c:CHO,t:'C'}; b[2][7]={c:CHO,t:'C'};
  b[7][1]={c:HAN,t:'C'}; b[7][7]={c:HAN,t:'C'};
  for(let c=0;c<9;c+=2){ b[3][c]={c:CHO,t:'P'}; b[6][c]={c:HAN,t:'P'}; }
  return b;
}

/* ================= AI (미니맥스 + 알파베타) ================= */
// 한(HAN) 최대화 기준 평가
function evaluate(b){
  let s=0;
  for(let r=0;r<10;r++)for(let c=0;c<9;c++){
    const p=b[r][c]; if(!p)continue;
    let v=VALUE[p.t];
    // 궁 근처 방어/중앙 진출 소폭 가산
    if(p.t==='P'){ v += p.c===HAN? (9-r)*6 : r*6; }       // 병졸 전진 장려
    if(p.t==='C'||p.t==='R'){ if(c>=3&&c<=5) v+=8; }       // 중앙 열 소폭
    s += p.c===HAN? v : -v;
  }
  return s;
}
function orderMoves(b,moves){
  moves.sort((a,d)=>{ const va=b[a[2]][a[3]]?VALUE[b[a[2]][a[3]].t]:0;
    const vd=b[d[2]][d[3]]?VALUE[b[d[2]][d[3]].t]:0; return vd-va; });
  return moves;
}
function minimax(b,depth,alpha,beta,maxing){
  const color=maxing?HAN:CHO;
  const moves=allMoves(b,color);
  if(moves.length===0) return maxing? -1e6-depth : 1e6+depth;
  if(depth===0) return evaluate(b) + (aiDepth>=3?0:(Math.random()*8-4));
  orderMoves(b,moves);
  if(maxing){ let best=-1e9;
    for(const[r,c,rr,cc]of moves){ const nb=clone(b); nb[rr][cc]=nb[r][c]; nb[r][c]=null;
      best=Math.max(best,minimax(nb,depth-1,alpha,beta,false)); alpha=Math.max(alpha,best); if(beta<=alpha)break; }
    return best;
  } else { let best=1e9;
    for(const[r,c,rr,cc]of moves){ const nb=clone(b); nb[rr][cc]=nb[r][c]; nb[r][c]=null;
      best=Math.min(best,minimax(nb,depth-1,alpha,beta,true)); beta=Math.min(beta,best); if(beta<=alpha)break; }
    return best;
  }
}
function bestMove(b,color,depth){
  const moves=allMoves(b,color); if(moves.length===0)return null;
  const maxing=color===HAN; let bestScore=maxing?-1e9:1e9, best=[];
  orderMoves(b,moves);
  for(const mv of moves){ const[r,c,rr,cc]=mv; const nb=clone(b); nb[rr][cc]=nb[r][c]; nb[r][c]=null;
    const sc=minimax(nb,depth-1,-1e9,1e9,!maxing);
    if(maxing? sc>bestScore : sc<bestScore){ bestScore=sc; best=[mv]; }
    else if(sc===bestScore) best.push(mv); }
  return best[Math.floor(Math.random()*best.length)];
}

/* ================= 효과음 (실제 나무 말 소리 합성) ================= */
let actx=null, noiseBuf=null, noiseBufShort=null;
function ac(){ if(!actx){try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}} return actx; }
function getNoise(a,dur){ // 백색소음 버퍼 (판/말 재질감의 원천)
  const n=Math.floor(a.sampleRate*dur), buf=a.createBuffer(1,n,a.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=Math.random()*2-1;
  return buf;
}
// 나무 "딱" 소리: 대역통과 필터 노이즈(타격 질감) + 저음 몸통(공명) 두 층을 겹침
function woodKnock({vol=.5, pitch=1, hard=1, dur=.16}={}){
  if(!soundOn)return; const a=ac(); if(!a)return;
  if(!noiseBuf) noiseBuf=getNoise(a,0.35);
  const t0=a.currentTime;
  // 1) 타격 노이즈 레이어 — 딱딱한 접촉음
  const src=a.createBufferSource(); src.buffer=noiseBuf;
  const bp=a.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1100*pitch; bp.Q.value=1.1*hard;
  const lp=a.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=3200*pitch;
  const ng=a.createGain(); ng.gain.setValueAtTime(vol*0.9,t0);
  ng.gain.exponentialRampToValueAtTime(0.001,t0+dur*0.55);
  src.connect(bp); bp.connect(lp); lp.connect(ng); ng.connect(a.destination);
  src.start(t0); src.stop(t0+dur*0.6);
  // 2) 저음 몸통 레이어 — 나무판/두꺼운 말이 울리는 공명
  const o=a.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(180*pitch,t0);
  o.frequency.exponentialRampToValueAtTime(85*pitch,t0+dur*0.5);
  const og=a.createGain(); og.gain.setValueAtTime(vol*0.85,t0);
  og.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  o.connect(og); og.connect(a.destination); o.start(t0); o.stop(t0+dur);
  // 3) 미세 잔향 배음 — 판 위 미세한 떨림
  const o2=a.createOscillator(); o2.type='triangle';
  o2.frequency.setValueAtTime(420*pitch,t0);
  const og2=a.createGain(); og2.gain.setValueAtTime(vol*0.18,t0);
  og2.gain.exponentialRampToValueAtTime(0.001,t0+dur*0.35);
  o2.connect(og2); og2.connect(a.destination); o2.start(t0); o2.stop(t0+dur*0.4);
}
// 말을 집을 때 — 가볍게 스치는 짧은 마찰음
function pieceLift(){
  if(!soundOn)return; const a=ac(); if(!a)return;
  if(!noiseBufShort) noiseBufShort=getNoise(a,0.08);
  const t0=a.currentTime;
  const src=a.createBufferSource(); src.buffer=noiseBufShort;
  const hp=a.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=2200;
  const g=a.createGain(); g.gain.setValueAtTime(0.12,t0); g.gain.exponentialRampToValueAtTime(0.001,t0+0.05);
  src.connect(hp); hp.connect(g); g.connect(a.destination); src.start(t0); src.stop(t0+0.06);
}
// 장군 — 놋쇠 종/징 울림 (두 배음이 살짝 어긋나 맥놀이)
function gong(vol=.3, dur=.9){
  if(!soundOn)return; const a=ac(); if(!a)return;
  const t0=a.currentTime;
  [523,527,784].forEach((f,i)=>{
    const o=a.createOscillator(); o.type=i===2?'triangle':'sine';
    o.frequency.setValueAtTime(f,t0);
    const g=a.createGain(); g.gain.setValueAtTime(vol*(i===2?0.5:0.85),t0);
    g.gain.exponentialRampToValueAtTime(0.0008,t0+dur);
    o.connect(g); g.connect(a.destination); o.start(t0); o.stop(t0+dur);
  });
}
function tone(freq,dur,type='sine',vol=.25){ // 승패 멜로디용 단순음
  if(!soundOn)return; const a=ac(); if(!a)return;
  const o=a.createOscillator(),g=a.createGain(); o.type=type;
  o.frequency.setValueAtTime(freq,a.currentTime);
  g.gain.setValueAtTime(vol,a.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+dur);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+dur);
}
const sfx={
  select:()=>pieceLift(),
  move:()=>woodKnock({vol:.55, pitch:1,   hard:1,   dur:.15}),
  capture:()=>{ woodKnock({vol:.5, pitch:1.12, hard:1.3, dur:.13});
    setTimeout(()=>woodKnock({vol:.62, pitch:0.82, hard:1.5, dur:.2}),110); }, // 들어올려 치우고 다시 놓는 이중 타격
  check:()=>gong(.32,.85),
  win:()=>{ gong(.3,1.1); [659,784,988,1319].forEach((f,i)=>setTimeout(()=>tone(f,.24,'triangle',.24),i*140+200)); },
  lose:()=>[392,349,294,220].forEach((f,i)=>setTimeout(()=>tone(f,.32,'sine',.22),i*180)),
  deny:()=>{ tone(160,.13,'sawtooth',.16); setTimeout(()=>tone(120,.16,'square',.14),70); },
};

/* ================= 렌더링 ================= */
const canvas=document.getElementById('board'), ctx=canvas.getContext('2d');
let CELL, PAD, DPR;
function layout(){
  const wrap=document.getElementById('boardwrap');
  const w=Math.min(wrap.clientWidth-20, 500);
  PAD=w*0.078; CELL=(w-2*PAD)/8;
  const h=PAD*2+CELL*9; DPR=window.devicePixelRatio||1;
  canvas.width=w*DPR; canvas.height=h*DPR; canvas.style.width=w+'px'; canvas.style.height=h+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0); draw();
}
function scr(r,c){ const R=flip?9-r:r, C=flip?8-c:c; return [PAD+C*CELL, PAD+R*CELL]; }

function draw(){
  const W=canvas.width/DPR, H=canvas.height/DPR;
  ctx.clearRect(0,0,W,H);
  // 나무결 판
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#e7cd92'); g.addColorStop(1,'#dcbf7e');
  ctx.fillStyle=g; roundRect(0,0,W,H,8); ctx.fill();
  ctx.strokeStyle='rgba(120,85,40,.15)'; ctx.lineWidth=1;
  for(let i=0;i<7;i++){ const yy=H*(i+.5)/7; ctx.beginPath(); ctx.moveTo(6,yy);
    ctx.bezierCurveTo(W*.3,yy-4,W*.7,yy+4,W-6,yy); ctx.stroke(); }
  // 격자 (한국 장기: 강 없이 전 노선 연결)
  ctx.strokeStyle='#5a3d1c'; ctx.lineWidth=1.4;
  for(let r=0;r<10;r++){ const[x0,y]=scr(r,0),[x1]=scr(r,8);
    ctx.beginPath(); ctx.moveTo(x0,y); ctx.lineTo(x1,y); ctx.stroke(); }
  for(let c=0;c<9;c++){ const[x,y0]=scr(0,c),[,y1]=scr(9,c);
    ctx.beginPath(); ctx.moveTo(x,y0); ctx.lineTo(x,y1); ctx.stroke(); }
  // 양 궁 대각선
  drawPalaceX(0,2); drawPalaceX(7,9);
  // 마지막 이동 강조
  if(lastMove) for(const[r,c]of[[lastMove.fr,lastMove.fc],[lastMove.tr,lastMove.tc]]){
    const[x,y]=scr(r,c); ctx.strokeStyle='rgba(181,138,60,.9)'; ctx.lineWidth=2.4;
    roundRect(x-CELL*0.44,y-CELL*0.44,CELL*0.88,CELL*0.88,6); ctx.stroke(); }
  // 힌트
  if(hintTarget){ const[x,y]=scr(hintTarget.r,hintTarget.c);
    ctx.strokeStyle='#b58a3c'; ctx.lineWidth=3; ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.arc(x,y,CELL*0.46,0,7); ctx.stroke(); ctx.setLineDash([]); }
  // 말 (아래→위 순서로 그려 겹침 자연스럽게)
  for(let r=9;r>=0;r--)for(let c=0;c<9;c++){ const p=board[r][c]; if(p) drawPiece(r,c,p); }
  // 장군 표시: 둘 차례인 편이 장군당한 상태면 그 궁을 붉게 강조하고 배지 표시
  const badge=document.getElementById('checkBadge');
  if(!gameOver && board && inCheck(board,turn)){
    const k=findK(board,turn);
    if(k){ const[x,y]=scr(k[0],k[1]), R=CELL*SIZE.K;
      ctx.save();
      ctx.strokeStyle='rgba(224,26,38,.95)'; ctx.lineWidth=4;
      ctx.shadowColor='rgba(224,26,38,.85)'; ctx.shadowBlur=16;
      octPath(x,y,R+4.5); ctx.stroke();
      ctx.lineWidth=2; ctx.shadowBlur=6; octPath(x,y,R+9); ctx.stroke();
      ctx.restore();
    }
    if(badge) badge.style.display='flex';
  } else if(badge){ badge.style.display='none'; }
}
function drawPalaceX(r0,r1){
  ctx.strokeStyle='#5a3d1c'; ctx.lineWidth=1.2;
  const A=scr(r0,3),B=scr(r1,5),C=scr(r0,5),D=scr(r1,3);
  ctx.beginPath(); ctx.moveTo(A[0],A[1]); ctx.lineTo(B[0],B[1]); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(C[0],C[1]); ctx.lineTo(D[0],D[1]); ctx.stroke();
}
// 팔각형 경로
function octPath(cx,cy,R){
  ctx.beginPath();
  for(let i=0;i<8;i++){ const a=Math.PI/8 + i*Math.PI/4;
    const x=cx+R*Math.cos(a), y=cy+R*Math.sin(a);
    i?ctx.lineTo(x,y):ctx.moveTo(x,y); }
  ctx.closePath();
}
function drawPiece(r,c,p){
  const[x,y]=scr(r,c), R=CELL*SIZE[p.t], depth=R*0.20;
  const isSel=selected&&selected.r===r&&selected.c===c;
  const isHan=p.c===HAN;
  const face1=isHan?'#f7ecd2':'#f4ead0', face2=isHan?'#e4cfa1':'#e0caa0';
  const rim=isHan?'#b58a52':'#a98f5c';
  const txt=isHan?'#c1121f':'#15633b', txtDeep=isHan?'#7e0d15':'#0c3d24';

  // 바닥 그림자
  ctx.fillStyle='rgba(50,32,10,.30)';
  octPath(x, y+depth+2.5, R*0.97); ctx.fill();
  // 옆면(두께)
  ctx.fillStyle=rim; octPath(x, y+depth, R); ctx.fill();
  // 윗면
  const rg=ctx.createRadialGradient(x-R*0.32,y-R*0.36,R*0.15, x,y,R*1.05);
  rg.addColorStop(0,'#fff7e6'); rg.addColorStop(0.5,face1); rg.addColorStop(1,face2);
  ctx.fillStyle=rg; octPath(x,y,R); ctx.fill();
  // 윗면 테두리(밝은 위, 어두운 아래로 입체감)
  ctx.lineWidth=1.6; ctx.strokeStyle='rgba(255,255,255,.55)'; octPath(x-0.6,y-0.8,R-0.6); ctx.stroke();
  ctx.lineWidth=1.4; ctx.strokeStyle='rgba(90,60,25,.45)'; octPath(x,y,R); ctx.stroke();
  // 색 이중 링 (편 구분)
  ctx.lineWidth=2.1; ctx.strokeStyle=txt; octPath(x,y,R*0.80); ctx.stroke();
  ctx.lineWidth=1; ctx.strokeStyle='rgba(0,0,0,.12)'; octPath(x,y,R*0.66); ctx.stroke();
  // 선택 강조
  if(isSel){ ctx.lineWidth=3; ctx.strokeStyle='#c8971f';
    octPath(x,y-0.5,R+3.5); ctx.stroke(); }
  // 글자 (음각 느낌: 밝은 하이라이트 + 본색)
  const fs=R*1.18;
  ctx.font=`700 ${fs}px "Noto Serif KR",serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(255,255,255,.5)'; ctx.fillText(GLYPH[p.c][p.t], x, y+2.2);
  ctx.fillStyle=txtDeep;              ctx.fillText(GLYPH[p.c][p.t], x, y+0.4);
  ctx.fillStyle=txt;                  ctx.fillText(GLYPH[p.c][p.t], x, y);
}
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

/* ================= 입력 ================= */
canvas.addEventListener('click', e=>{
  if(gameOver||thinking)return;
  if(mode==='ai'&&turn!==humanColor)return;
  const rect=canvas.getBoundingClientRect();
  const px=e.clientX-rect.left, py=e.clientY-rect.top;
  let best=null,bd=1e9;
  for(let r=0;r<10;r++)for(let c=0;c<9;c++){ const[x,y]=scr(r,c); const d=(x-px)**2+(y-py)**2; if(d<bd){bd=d;best=[r,c];} }
  if(bd>(CELL*0.6)**2)return;
  handleTap(best[0],best[1]);
});
function handleTap(r,c){
  hintTarget=null; const p=board[r][c];
  if(selected){
    if(legalForSel.some(m=>m[0]===r&&m[1]===c)){
      // 반복 장군 3회째면 반칙 — 두지 못하게 막고 다른 길로 안내
      if(checkRepetitionOrdinal(selected.r,selected.c,r,c,turn)>=REP_LIMIT){
        const anySafe=allMoves(board,turn).some(m=>checkRepetitionOrdinal(m[0],m[1],m[2],m[3],turn)<REP_LIMIT);
        if(anySafe){ sfx.deny(); flash('','🚫 같은 장군 3회는 반칙패! 다른 길을 찾으세요'); return; }
        // 피할 수 있는 수가 전혀 없으면 규칙상 반칙패
        endGame(opp(turn),'repetition'); return;
      }
      doMove(selected.r,selected.c,r,c); return;
    }
    if(p&&p.c===turn){ selectPiece(r,c); return; }
    selected=null; legalForSel=[]; draw(); return;
  }
  if(p&&p.c===turn) selectPiece(r,c);
}
function selectPiece(r,c){ selected={r,c}; legalForSel=legalMoves(board,r,c); sfx.select(); draw(); }

/* ================= 이동 실행 ================= */
function doMove(fr,fc,tr,tc){
  const mover=turn;
  const ordinal=checkRepetitionOrdinal(fr,fc,tr,tc,mover); // 장군 회차 (0=장군 아님)
  const captured=board[tr][tc];
  history.push({board:clone(board),turn,lastMove});
  board[tr][tc]=board[fr][fc]; board[fr][fc]=null;
  lastMove={fr,fc,tr,tc}; selected=null; legalForSel=[]; hintTarget=null;
  const enemy=opp(mover); const checking=inCheck(board,enemy);
  if(captured)sfx.capture(); else sfx.move();
  turn=enemy;
  posLog.push(sig(board,turn));         // 국면 서명 기록
  draw();
  const enemyMoves=allMoves(board,turn);
  if(enemyMoves.length===0){ endGame(mover, checking?'checkmate':'stalemate'); return; }
  if(checking){ setTimeout(sfx.check,120);
    if(ordinal>=2) flash('','⚠ 반복 장군 주의 — 한 번 더 같은 장군이면 반칙패'); }
  updateStatus();
  if(mode==='ai'&&turn!==humanColor&&!gameOver){ thinking=true; updateStatus(); setTimeout(aiTurn,260); }
}
function pickBestAmong(moves,color){ // 주어진 수들 중 정적 평가로 최선 선택(폴백용)
  const maxing=color===HAN; let bs=maxing?-1e9:1e9, best=[];
  for(const mv of moves){ const[r,c,rr,cc]=mv; const nb=clone(board); nb[rr][cc]=nb[r][c]; nb[r][c]=null;
    const sc=evaluate(nb);
    if(maxing?sc>bs:sc<bs){bs=sc;best=[mv];} else if(sc===bs)best.push(mv); }
  return best[Math.floor(Math.random()*best.length)];
}
function aiTurn(){
  const moves=allMoves(board,turn);
  if(moves.length===0){ endGame(humanColor,'checkmate'); return; }
  // 반복 장군 3회째가 되는 반칙수 제외
  const safe=moves.filter(m=>checkRepetitionOrdinal(m[0],m[1],m[2],m[3],turn)<REP_LIMIT);
  if(safe.length===0){ thinking=false; endGame(humanColor,'repetition'); return; }
  let mv;
  if(aiDepth===1 && Math.random()<0.28) mv=safe[Math.floor(Math.random()*safe.length)];
  else {
    mv=bestMove(board,turn,aiDepth);
    if(!mv || checkRepetitionOrdinal(mv[0],mv[1],mv[2],mv[3],turn)>=REP_LIMIT) mv=pickBestAmong(safe,turn);
  }
  thinking=false; doMove(mv[0],mv[1],mv[2],mv[3]);
}

/* ================= 상태/종료 ================= */
function updateStatus(){
  const dot=document.getElementById('turndot'), txt=document.getElementById('turntext');
  dot.className='dot '+(turn===HAN?'han':'cho');
  let label = turn===HAN?'한(漢) 차례':'초(楚) 차례';
  if(mode==='ai') label = turn===humanColor?'내 차례':(thinking?'컴퓨터가 생각 중…':'컴퓨터 차례');
  txt.textContent=label;
  // 수 쉼 버튼: 장군 아닐 때만
  const passBtn=document.getElementById('btnPass');
  const canPass = !gameOver && !thinking && !(mode==='ai'&&turn!==humanColor) && !inCheck(board,turn);
  passBtn.disabled=!canPass;
}
let flashTimer=null;
function flash(who,text){ const m=document.getElementById('msg'); m.textContent='◆ '+text;
  clearTimeout(flashTimer); flashTimer=setTimeout(()=>m.textContent='',1600); }
function endGame(winner,reason){
  gameOver=true; updateStatus();
  const cb=document.getElementById('checkBadge'); if(cb) cb.style.display='none';
  const rico=document.getElementById('rico'), rt=document.getElementById('rtitle'), rx=document.getElementById('rtext');
  const winName = winner===HAN?'한(漢)':'초(楚)';
  const loseName = winner===HAN?'초(楚)':'한(漢)';
  const reasonText = reason==='checkmate' ? '외통수로 궁을 잡았습니다.'
    : reason==='repetition' ? (loseName+'이(가) 같은 장군을 3회 반복하여 반칙패했습니다.')
    : '상대가 둘 수 없어 이겼습니다.';
  if(mode==='ai'){
    if(winner===humanColor){ rico.textContent='🏆'; rt.textContent='승리!';
      rx.textContent = reason==='repetition'?'컴퓨터가 반복 장군으로 반칙패했습니다!':'컴퓨터를 이겼습니다. 훌륭합니다!'; sfx.win(); }
    else{ rico.textContent='🥀'; rt.textContent='패배';
      rx.textContent = reason==='repetition'?'같은 장군을 3회 반복하여 반칙패했습니다.':'아쉽네요. 다시 도전해 보세요.'; sfx.lose(); }
  } else {
    rico.textContent='🏆'; rt.textContent=winName+' 승리!'; rx.textContent=reasonText; sfx.win();
  }
  document.getElementById('result').classList.remove('hide');
}

/* ================= 컨트롤 ================= */
document.getElementById('btnHint').addEventListener('click',()=>{
  if(gameOver||thinking)return; if(mode==='ai'&&turn!==humanColor)return;
  const mv=bestMove(board,turn,Math.min(aiDepth,2));
  if(mv){ selected={r:mv[0],c:mv[1]}; legalForSel=legalMoves(board,mv[0],mv[1]);
    hintTarget={r:mv[2],c:mv[3]}; sfx.select(); draw();
    flash('','추천: '+GLYPH[board[mv[0]][mv[1]].c][board[mv[0]][mv[1]].t]+' 이동'); }
});
document.getElementById('btnUndo').addEventListener('click',()=>{
  if(thinking)return; const steps=mode==='ai'?2:1;
  for(let i=0;i<steps&&history.length;i++){ const h=history.pop(); board=h.board; turn=h.turn; lastMove=h.lastMove;
    if(posLog.length>1) posLog.pop(); }
  selected=null; legalForSel=[]; hintTarget=null; gameOver=false;
  document.getElementById('result').classList.add('hide'); draw(); updateStatus(); sfx.select();
});
document.getElementById('btnPass').addEventListener('click',function(){
  if(this.disabled)return;
  history.push({board:clone(board),turn,lastMove});
  turn=opp(turn); selected=null; legalForSel=[]; hintTarget=null;
  posLog.push(sig(board,turn));
  flash('','수 쉼'); draw(); updateStatus();
  if(mode==='ai'&&turn!==humanColor&&!gameOver){ thinking=true; updateStatus(); setTimeout(aiTurn,260); }
});
document.getElementById('btnSound').addEventListener('click',function(){
  soundOn=!soundOn; this.classList.toggle('on',soundOn);
  this.querySelector('.ic').textContent=soundOn?'♪':'✕'; if(soundOn)sfx.select();
});
document.getElementById('btnMenu').addEventListener('click',()=>{
  document.getElementById('result').classList.add('hide');
  document.getElementById('setup').classList.remove('hide');
});

/* ================= 시작 화면 ================= */
let selMode='ai', selDiff=2, selColor='han', selSetup='HE';
function bindOpts(id,attr,setter){
  document.getElementById(id).addEventListener('click',e=>{
    const b=e.target.closest('.opt'); if(!b)return;
    [...b.parentElement.children].forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel'); setter(b.dataset[attr]);
  });
}
bindOpts('modeOpts','mode',v=>{ selMode=v;
  document.getElementById('diffGroup').style.display=v==='ai'?'block':'none';
  document.getElementById('colorGroup').style.display=v==='ai'?'block':'none';
});
bindOpts('diffOpts','diff',v=>selDiff=+v);
bindOpts('colorOpts','color',v=>selColor=v);
bindOpts('setupOpts','setup',v=>selSetup=v);

function startGame(){
  mode=selMode; aiDepth=selDiff; humanColor=selColor==='han'?HAN:CHO; setupType=selSetup;
  flip = (mode==='ai' && humanColor===CHO);
  board=makeBoard(); turn=HAN; selected=null; legalForSel=[]; history=[];
  posLog=[sig(board,turn)];
  gameOver=false; lastMove=null; hintTarget=null; thinking=false;
  document.getElementById('setup').classList.add('hide');
  document.getElementById('result').classList.add('hide');
  document.getElementById('msg').textContent='';
  ac(); layout(); updateStatus();
  if(mode==='ai'&&turn!==humanColor){ thinking=true; updateStatus(); setTimeout(aiTurn,320); }
}
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('againBtn').addEventListener('click',startGame);
window.addEventListener('resize',()=>{ if(board)layout(); });

// 배경 초기판
board=makeBoard(); turn=HAN; layout();

/* ================= PWA: 오프라인 캐싱용 서비스워커 등록 =================
   같은 파일을 그대로 오프라인에서도 열리게 캐싱한다.
   file://로 직접 열었을 때는 브라우저 정책상 등록되지 않을 수 있으나,
   그 경우에도 게임 자체는 정상 동작하며 홈 화면 추가도 가능하다. */
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE='janggi-v1';
    self.addEventListener('install', e=>{ self.skipWaiting(); });
    self.addEventListener('activate', e=>{ self.clients.claim(); });
    self.addEventListener('fetch', e=>{
      e.respondWith(
        caches.open(CACHE).then(async cache=>{
          const cached = await cache.match(e.request);
          if(cached) return cached;
          try{
            const res = await fetch(e.request);
            if(e.request.method==='GET') cache.put(e.request, res.clone());
            return res;
          }catch(err){ return cached || Response.error(); }
        })
      );
    });
  `;
  try{
    const blob = new Blob([swCode], {type:'application/javascript'});
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  }catch(e){ /* file://에서 차단되면 조용히 무시 — 게임 동작에는 영향 없음 */ }
}
